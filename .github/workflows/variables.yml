name: Variables
run-name: Workflow de actions usando variables

on:
  push:
  workflow_dispatch:

env:
  First_Name: Yaretzi
  DAY_OF_WEEK: Lunes 25
  MONTH: Mayo

jobs:
  variables:
    runs-on: ubuntu-latest

    env:
      PORT: 8080

    steps:
      - name: Mostrar fecha
        run: echo "Hoy es $DAY_OF_WEEK del mes de $MONTH"

      - name: Mostrar puerto
        run: echo "El puerto es $PORT"

      - name: Mostrar nombre global
        run: echo "Mi nombre es $First_Name"

      - name: Leyendo variable de entorno
        env:
          NOMBRE: Yare
        run: echo "El valor de la variable es $NOMBRE"