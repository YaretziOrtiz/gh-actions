name: Expression

on:
  workflow_dispatch:
    inputs:
      edad:
        description: 'Edad'
        required: true
        type: string

      nombre:
        description: 'Tu nombre'
        required: true
        default: 'Juan'
        type: string

jobs:
  mayor:
    if: ${{ inputs.edad >= 18 }}
    runs-on: ubuntu-latest

    steps:
      - name: Correr
        run: echo "${{ inputs.nombre }} es mayor de edad"

  menor:
    if: ${{ inputs.edad < 18 }}
    runs-on: ubuntu-latest

    steps:
      - name: Correr
        run: echo "${{ inputs.nombre }} es menor de edad"
  ejecuta-python-condicionales:
    runs-on: ubuntu-latest
    steps:
      - run: echo "EDAD=${{ inputs.edad }}" >> $GITHUB_ENV
      - run: echo "NAME=${{ inputs.nombre }}" >> $GITHUB_ENV
      - uses: actions/checkout@v4
      - run: python condicionales.py